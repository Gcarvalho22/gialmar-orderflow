<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>GC Contacts - Teste</title><style>body{font-family:sans-serif;padding:20px;background:#e8f4fd}.box{background:#fff;padding:20px;border-radius:10px;margin:10px 0;border-left:4px solid #1565c0}.ok{border-left-color:#2e7d32;color:#2e7d32}.err{border-left-color:#c62828;color:#c62828}.info{color:#666;font-size:13px}</style></head><body><h2 style="color:#0d2137">&#x2693; Goncalo Contacts — Diagnostico</h2><div class="box" id="s1">&#x23F3; A testar ligacao ao Google Sheets...</div><div class="box info" id="s2"></div><div class="box info" id="s3"></div><script>var URL="https://script.google.com/macros/s/AKfycbyWCvCt36e-oLl-elonsegSa2lNxW_T8giCKmMzt1vbcVoytRy_IWlMpupRbnipx5gG/exec";function log(id,msg,cls){var el=document.getElementById(id);if(el){el.textContent=msg;if(cls)el.className="box "+cls;}}var cb="_t"+Date.now();var s=document.createElement("script");var t=setTimeout(function(){log("s1","ERRO: Timeout - Apps Script nao responde","err");log("s2","Solucao: Republica o Apps Script como Web App","info");},10000);window[cb]=function(data){clearTimeout(t);if(Array.isArray(data)&&data.length>0){log("s1","SUCESSO! "+data.length+" contactos recebidos do Google Sheets","ok");log("s2","Primeiro contacto: "+data[0].company+" ("+data[0].country+")","ok");log("s3","A app esta pronta a usar!","ok");}else{log("s1","Google Sheets vazio ou sem dados","err");log("s2","Corre a funcao importarContactosGoncalo no Apps Script","info");}};s.onerror=function(){clearTimeout(t);log("s1","ERRO de ligacao (script.onerror)","err");log("s2","Verifica se o Apps Script esta publicado como Web App","info");};s.src=URL+"?action=getContacts&callback="+cb+"&t="+Date.now();document.head.appendChild(s);</script></body></html>
